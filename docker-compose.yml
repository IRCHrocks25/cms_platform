services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cms-platform:latest
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DATABASE_URL: ${DATABASE_URL}
      TENANT_BASE_DOMAIN: ${TENANT_BASE_DOMAIN:-sites.katek.app}
      # Iframe embedding (e.g. inside a GHL Custom Menu Link). Must be
      # forwarded — Dokploy holds the value but docker-compose only passes
      # vars listed here. See settings.py::IFRAME_EMBED.
      IFRAME_EMBED: ${IFRAME_EMBED:-0}
      # GHL marketplace app integration. AUTO_LOGIN gates /embed/.
      GHL_AUTO_LOGIN: ${GHL_AUTO_LOGIN:-0}
      GHL_CLIENT_ID: ${GHL_CLIENT_ID:-}
      GHL_CLIENT_SECRET: ${GHL_CLIENT_SECRET:-}
      GHL_SHARED_SECRET: ${GHL_SHARED_SECRET:-}
      GHL_FRAME_ANCESTORS: ${GHL_FRAME_ANCESTORS:-}
      # Fernet key for encrypting GHL OAuth tokens at rest. Without it the
      # connect/callback/bind flows fail closed (503). See settings.py.
      GHL_TOKEN_ENCRYPTION_KEY: ${GHL_TOKEN_ENCRYPTION_KEY:-}
      # GHL global Ed25519 webhook public key (PEM, \n-escaped one-liner ok).
      # When set, /connect/webhook/ enforces X-GHL-Signature verification.
      GHL_WEBHOOK_PUBLIC_KEY: ${GHL_WEBHOOK_PUBLIC_KEY:-}
      # When the embed flow redirects to a tenant subdomain, the session
      # cookie needs to span the parent domain. Set to ".sites.katek.app".
      COOKIE_PARENT_DOMAIN: ${COOKIE_PARENT_DOMAIN:-}
      # Custom client domains: origin IP clients point an A record at; the
      # dashboard's verify step checks the domain resolves here. Traefik then
      # auto-issues a Let's Encrypt cert per domain. See deploy/DOKPLOY.md.
      CUSTOM_DOMAIN_TARGET_IP: ${CUSTOM_DOMAIN_TARGET_IP:-5.78.149.237}
      # AI annotation. Without these forwarded, the container never sees the key
      # Dokploy holds and annotate_html() raises "OPENAI_API_KEY is not set".
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ANNOTATE_MODEL: ${OPENAI_ANNOTATE_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-120}
      # Transactional email (Resend).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      # Media uploads (Cloudinary).
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    volumes:
      - media:/app/media
    healthcheck:
      # Probe the DB-backed /healthz endpoint. curl is installed in the image.
      # start_period covers migrations + gunicorn boot so failures during
      # startup don't count against the container. An orchestrator that waits
      # for "healthy" before swapping (Dokploy zero-downtime / Swarm rolling)
      # uses this to avoid the ERR_CONNECTION_CLOSED window on redeploy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # We declare our OWN service name — stable, never a Dokploy-generated
      # container name. Every router below points at it (see deploy/DOKPLOY.md).
      - traefik.http.services.cms-web.loadbalancer.server.port=8000

      # Agency apex / bare base domain.
      # Deliberately HostRegexp, NOT Host(`sites.katek.app`): the websecure
      # entrypoint sets a default certResolver=letsencrypt, and a tls=true router
      # with an extractable domain (Host()) would inherit it and try to ACME-issue
      # for sites.katek.app. HostRegexp exposes no extractable domain, so Traefik
      # skips ACME and serves the default-store cert (the CF Origin CA) — which is
      # what we want at the origin. ^...$ anchors to the apex exactly (no subdomains).
      - traefik.http.routers.cms-apex.rule=HostRegexp(`^sites\.katek\.app$`)
      - traefik.http.routers.cms-apex.entrypoints=websecure
      - traefik.http.routers.cms-apex.tls=true
      - traefik.http.routers.cms-apex.service=cms-web
      - traefik.http.routers.cms-apex.priority=100

      # Free tenant subdomains: *.sites.katek.app
      # Single-level wildcard Host() matchers — Host(`*.sites.katek.app`) — were
      # added in Traefik v3.7.0. This host runs an older v3 (Dokploy bundles
      # ~3.6.x; exact version recorded in deploy/DOKPLOY.md), so we use HostRegexp,
      # which works on all of v3. We'd keep HostRegexp even after a 3.7+ upgrade:
      # the wildcard Host() matcher's only real edge is per-router TLS options,
      # and we serve one default-store cert, not per-router options.
      # HostRegexp = RE2 (no negative lookahead), so reserved names (www, app, api,
      # admin, dashboard, static, media, mail) can't be excluded in-pattern. They
      # nominally match here but route to the same app; the day one needs a
      # different service, give it an exact Host() router — its higher priority
      # outranks this priority=10 wildcard.
      - traefik.http.routers.cms-tenants.rule=HostRegexp(`^[a-z0-9-]+\.sites\.katek\.app$`)
      - traefik.http.routers.cms-tenants.entrypoints=websecure
      - traefik.http.routers.cms-tenants.tls=true
      - traefik.http.routers.cms-tenants.service=cms-web
      - traefik.http.routers.cms-tenants.priority=10

      # HTTP→HTTPS redirect (origin-level) for the agency apex + tenant hosts.
      # The CF-fronted hosts already get upgraded at the Cloudflare edge ("Always
      # Use HTTPS"), but that's the ONLY redirect today — nothing fires if a
      # request reaches the origin on :80 directly (e.g. someone hitting the IP
      # with a Host header, or the edge toggle off). These web-entrypoint routers
      # make the redirect consistent with the custom-domain routers (which already
      # 30x http→https via core/services/traefik_routes.py) and independent of the
      # CF toggle. The redirect middleware short-circuits before the backend, so no
      # plain-HTTP request ever reaches Django — which is why we DON'T use Django's
      # SECURE_SSL_REDIRECT (it would 301 the internal /healthz probe that hits
      # http://localhost:8000 with no X-Forwarded-Proto and break the healthcheck).
      #
      # Self-contained middleware (docker provider), NOT the syncer's
      # cms-redirect-to-https@file: that file middleware only exists when there's
      # ≥1 verified custom domain, so referencing it here would 404 these routers
      # whenever the verified set is empty. Same redirectScheme config as the
      # syncer's, so behavior is identical across all hosts.
      - traefik.http.middlewares.cms-redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.cms-redirect-to-https.redirectscheme.permanent=true

      # Agency apex on :80 → redirect. Anchored HostRegexp (matches only the apex),
      # so this is not a port-80 catch-all on the shared host. No tls (plain HTTP);
      # service is required by Traefik even though the middleware answers first.
      - traefik.http.routers.cms-apex-web.rule=HostRegexp(`^sites\.katek\.app$`)
      - traefik.http.routers.cms-apex-web.entrypoints=web
      - traefik.http.routers.cms-apex-web.middlewares=cms-redirect-to-https
      - traefik.http.routers.cms-apex-web.service=cms-web
      - traefik.http.routers.cms-apex-web.priority=100

      # Tenant subdomains on :80 → redirect. Same anchored regex as cms-tenants.
      # Does not match client custom domains (different hosts), so their ACME
      # HTTP-01 challenge on :80 is untouched.
      - traefik.http.routers.cms-tenants-web.rule=HostRegexp(`^[a-z0-9-]+\.sites\.katek\.app$`)
      - traefik.http.routers.cms-tenants-web.entrypoints=web
      - traefik.http.routers.cms-tenants-web.middlewares=cms-redirect-to-https
      - traefik.http.routers.cms-tenants-web.service=cms-web
      - traefik.http.routers.cms-tenants-web.priority=10

      # NOTE: no `.+` catch-all router. This Dokploy host is SHARED with other
      # stacks, and a catch-all would make this app the default backend for every
      # unmatched host on the box. Custom client domains are routed instead by
      # per-domain routers in a Traefik dynamic file, regenerated from the DB by
      # the `route-syncer` service below. See deploy/DOKPLOY.md.

  # Isolated writer for the custom-domain Traefik dynamic file. Reads the DB and
  # regenerates one router per verified CustomDomain on a loop. It is the ONLY
  # container with a Traefik mount — the web app (internet-facing) has none, so a
  # web-app compromise has no path to Traefik config. Serves no traffic.
  route-syncer:
    image: cms-platform:latest
    restart: unless-stopped
    depends_on:
      - web
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "0"
      DATABASE_URL: ${DATABASE_URL}
      TRAEFIK_DYNAMIC_DIR: /traefik-dynamic
    volumes:
      # Mounts the dynamic-config ROOT (not a subdir): Traefik's file provider
      # watches `directory:` non-recursively, so a subdir file would be ignored.
      # The writer is confined by CODE, not by mount scope — traefik_routes.py
      # only ever creates/replaces its own custom-domains.yml (+ its own temp
      # file) and never enumerates, modifies, or deletes siblings (dokploy.yml,
      # middlewares.yml, traefik.yml, acme.json, origin-cert.yml).
      - /etc/dokploy/traefik/dynamic:/traefik-dynamic
    networks:
      - dokploy-network
    # Override entrypoint.sh: it runs `migrate` before exec-ing the command, and
    # `web` already owns migrations — running them here too would race the web
    # container's migrate (concurrent DDL) on first deploy. The syncer only reads
    # the DB and writes one file. The image runs as root (no USER in Dockerfile),
    # so it can write the root-owned dynamic dir above.
    entrypoint: ["sh", "-c"]
    command: ["while true; do python manage.py sync_traefik_routes; sleep 20; done"]
    labels:
      - traefik.enable=false

volumes:
  media:

networks:
  dokploy-network:
    external: true
