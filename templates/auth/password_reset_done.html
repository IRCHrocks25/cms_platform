{% extends "base.html" %}

{% block title %}Check your email · KATEK Site Engine{% endblock %}

{% block shell %}
<div class="auth-shell">
  <div class="auth-card">
    <h1>Check your email</h1>
    <p class="auth-sub">
      If that email is registered, a reset link has been sent. The link expires in
      1 hour. Don't see it? Check your spam folder.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-block">Back to sign in</a>
  </div>
</div>
{% endblock %}
