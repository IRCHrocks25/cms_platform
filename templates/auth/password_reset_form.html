{% extends "base.html" %}

{% block title %}Reset password · KATEK Site Engine{% endblock %}

{% block shell %}
<div class="auth-shell">
  <div class="auth-card">
    <h1>Reset your password</h1>
    <p class="auth-sub">Enter the email on your account and we'll send you a link to set a new password.</p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="field">
        <label class="field-label" for="id_email">Email</label>
        <input class="input" type="email" name="email" id="id_email"
               autocomplete="email" required autofocus
               value="{{ form.email.value|default:'' }}">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
    </form>

    <p style="margin-top: var(--space-5); font-size: 14px;">
      <a href="{% url 'login' %}">← Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
