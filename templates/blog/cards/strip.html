<section class="cms-blog-strip cms-blog-strip--cards" data-cms-blog-strip>
  <style>
    .cms-blog-strip--cards { box-sizing: border-box; padding: 76px 24px; background: #f7f8fc; font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #14141f; }
    .cms-blog-strip--cards * { box-sizing: border-box; }
    .cms-blog-strip--cards .cbs-wrap { max-width: 1080px; margin: 0 auto; }
    .cms-blog-strip--cards .cbs-head { text-align: center; margin-bottom: 36px; }
    .cms-blog-strip--cards .cbs-heading { font-family: Georgia, 'Times New Roman', serif; font-size: 32px; margin: 0 0 6px; color: #14141f; }
    .cms-blog-strip--cards .cbs-all { font-size: 14px; font-weight: 500; color: {{ accent|default:"#2563eb" }}; text-decoration: none; }
    .cms-blog-strip--cards .cbs-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .cms-blog-strip--cards .cbs-item { display: flex; flex-direction: column; background: #fff; border: 1px solid #e7e8ef; border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; transition: transform .15s ease, box-shadow .15s ease; }
    .cms-blog-strip--cards .cbs-item:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(10,10,20,0.10); }
    .cms-blog-strip--cards .cbs-cover { aspect-ratio: 16/10; width: 100%; object-fit: cover; background: #f0f1f6; }
    .cms-blog-strip--cards .cbs-text { padding: 18px; }
    .cms-blog-strip--cards .cbs-date { font-size: 12px; color: #8a8fa3; margin-bottom: 6px; }
    .cms-blog-strip--cards .cbs-title { font-family: Georgia, 'Times New Roman', serif; font-size: 19px; line-height: 1.3; color: #14141f; }
  </style>
  <div class="cbs-wrap">
    <div class="cbs-head">
      <h2 class="cbs-heading">{{ heading }}</h2>
      <a class="cbs-all" href="{{ blog_base }}">View all posts →</a>
    </div>
    <div class="cbs-list">
      {% for post in posts %}
        <a class="cbs-item" href="{{ blog_base }}{{ post.slug }}/">
          <img class="cbs-cover" src="{{ post.cover_image|default:'https://placehold.co/600x375?text=+' }}" alt="{{ post.title }}">
          <span class="cbs-text">
            <span class="cbs-date">{{ post.publish_date|date:"M j, Y" }}</span>
            <span class="cbs-title">{{ post.title }}</span>
          </span>
        </a>
      {% endfor %}
    </div>
  </div>
</section>
