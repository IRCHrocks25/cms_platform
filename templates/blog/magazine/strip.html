<section class="cms-blog-strip cms-blog-strip--magazine" data-cms-blog-strip>
  <style>
    .cms-blog-strip--magazine { box-sizing: border-box; padding: 80px 24px; background: #14141f; color: #fff; font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .cms-blog-strip--magazine * { box-sizing: border-box; }
    .cms-blog-strip--magazine .cbs-wrap { max-width: 1080px; margin: 0 auto; }
    .cms-blog-strip--magazine .cbs-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; gap: 16px; }
    .cms-blog-strip--magazine .cbs-heading { font-family: Georgia, 'Times New Roman', serif; font-size: 32px; margin: 0; color: #fff; }
    .cms-blog-strip--magazine .cbs-all { font-size: 14px; font-weight: 500; color: #fff; opacity: 0.8; text-decoration: none; }
    .cms-blog-strip--magazine .cbs-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
    .cms-blog-strip--magazine .cbs-item { position: relative; display: block; text-decoration: none; color: #fff; border-radius: 14px; overflow: hidden; min-height: 280px; background: #23242e; }
    .cms-blog-strip--magazine .cbs-cover { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.62; }
    .cms-blog-strip--magazine .cbs-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,20,31,0) 30%, rgba(20,20,31,0.92) 100%); }
    .cms-blog-strip--magazine .cbs-text { position: absolute; left: 0; right: 0; bottom: 0; padding: 22px; }
    .cms-blog-strip--magazine .cbs-date { font-size: 12px; opacity: 0.75; margin-bottom: 6px; }
    .cms-blog-strip--magazine .cbs-title { font-family: Georgia, 'Times New Roman', serif; font-size: 21px; line-height: 1.25; color: #fff; }
    .cms-blog-strip--magazine .cbs-item:hover .cbs-cover { opacity: 0.8; }
  </style>
  <div class="cbs-wrap">
    <div class="cbs-head">
      <h2 class="cbs-heading">{{ heading }}</h2>
      <a class="cbs-all" href="{{ blog_base }}">View all →</a>
    </div>
    <div class="cbs-list">
      {% for post in posts %}
        <a class="cbs-item" href="{{ blog_base }}{{ post.slug }}/">
          <img class="cbs-cover" src="{{ post.cover_image|default:'https://placehold.co/600x400?text=+' }}" alt="{{ post.title }}">
          <span class="cbs-overlay"></span>
          <span class="cbs-text">
            <span class="cbs-date">{{ post.publish_date|date:"M j, Y" }}</span>
            <span class="cbs-title">{{ post.title }}</span>
          </span>
        </a>
      {% endfor %}
    </div>
  </div>
</section>
