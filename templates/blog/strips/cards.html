{% load humanize %}
<section class="cms-blog-strip cms-strip cms-strip--cards" data-cms-blog-strip>
  <style>
    .cms-strip--cards{--cbs-accent:{{ accent|default:"#2563eb" }};box-sizing:border-box;padding:clamp(48px,7vw,88px) 24px;background:#fbfbfd;font-family:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#14141f;}
    .cms-strip--cards *{box-sizing:border-box;}
    .cms-strip--cards .cbs-wrap{max-width:1160px;margin:0 auto;}
    .cms-strip--cards .cbs-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:clamp(24px,4vw,40px);flex-wrap:wrap;}
    .cms-strip--cards .cbs-eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--cbs-accent);margin:0 0 8px;}
    .cms-strip--cards .cbs-heading{font-family:'Fraunces',Georgia,serif;font-size:clamp(26px,3.4vw,40px);line-height:1.1;letter-spacing:-.02em;margin:0;font-weight:600;}
    .cms-strip--cards .cbs-all{font-size:14px;font-weight:600;color:var(--cbs-accent);text-decoration:none;white-space:nowrap;}
    .cms-strip--cards .cbs-all:hover{text-decoration:underline;}
    .cms-strip--cards .cbs-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:clamp(18px,2.4vw,28px);}
    .cms-strip--cards .cbs-item{display:flex;flex-direction:column;background:#fff;border:1px solid #ececf1;border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;}
    .cms-strip--cards .cbs-item:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(20,20,31,.12);border-color:#e2e2ea;}
    .cms-strip--cards .cbs-cover{aspect-ratio:16/10;width:100%;object-fit:cover;background:#eef0f6;display:block;}
    .cms-strip--cards .cbs-text{padding:20px 22px 24px;display:flex;flex-direction:column;flex:1;}
    .cms-strip--cards .cbs-date{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9499ac;margin-bottom:10px;}
    .cms-strip--cards .cbs-title{font-family:'Fraunces',Georgia,serif;font-size:21px;line-height:1.28;font-weight:600;margin:0 0 10px;letter-spacing:-.01em;}
    .cms-strip--cards .cbs-excerpt{font-size:14.5px;line-height:1.6;color:#5a5f72;margin:0 0 16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .cms-strip--cards .cbs-more{margin-top:auto;font-size:13.5px;font-weight:600;color:var(--cbs-accent);}
  </style>
  <div class="cbs-wrap">
    <div class="cbs-head">
      <div>
        <p class="cbs-eyebrow">Latest</p>
        <h2 class="cbs-heading">{{ heading }}</h2>
      </div>
      <a class="cbs-all" href="{{ blog_base }}">View all posts →</a>
    </div>
    <div class="cbs-list">
      {% for post in posts %}
        <a class="cbs-item" href="{{ blog_base }}{{ post.slug }}/">
          <img class="cbs-cover" src="{{ post.cover_image|default:'https://placehold.co/600x375?text=+' }}" alt="{{ post.title }}" loading="lazy">
          <span class="cbs-text">
            {% if post.publish_date %}<span class="cbs-date">{{ post.publish_date|date:"M j, Y" }}</span>{% endif %}
            <span class="cbs-title">{{ post.title }}</span>
            <span class="cbs-excerpt">{{ post.display_excerpt }}</span>
            <span class="cbs-more">Read article →</span>
          </span>
        </a>
      {% endfor %}
    </div>
  </div>
</section>
