{% load humanize %}
<section class="cms-blog-strip cms-strip cms-strip--list" data-cms-blog-strip>
  <style>
    .cms-strip--list{--cbs-accent:{{ accent|default:"#2563eb" }};box-sizing:border-box;padding:clamp(48px,7vw,88px) 24px;background:#fff;font-family:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#14141f;}
    .cms-strip--list *{box-sizing:border-box;}
    .cms-strip--list .cbs-wrap{max-width:820px;margin:0 auto;}
    .cms-strip--list .cbs-head{margin-bottom:clamp(20px,3vw,32px);text-align:center;}
    .cms-strip--list .cbs-eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--cbs-accent);margin:0 0 8px;}
    .cms-strip--list .cbs-heading{font-family:'Fraunces',Georgia,serif;font-size:clamp(26px,3.4vw,40px);line-height:1.1;letter-spacing:-.02em;margin:0;font-weight:600;}
    .cms-strip--list .cbs-rows{margin:0;}
    .cms-strip--list .cbs-row{display:grid;grid-template-columns:128px 1fr;gap:clamp(16px,3vw,32px);align-items:baseline;padding:clamp(18px,2.6vw,26px) 0;border-top:1px solid #ececf1;text-decoration:none;color:inherit;}
    @media (max-width:560px){.cms-strip--list .cbs-row{grid-template-columns:1fr;gap:6px;}}
    .cms-strip--list .cbs-date{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9499ac;padding-top:6px;}
    .cms-strip--list .cbs-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(20px,2.2vw,26px);line-height:1.22;letter-spacing:-.01em;font-weight:600;margin:0 0 8px;transition:color .15s ease;}
    .cms-strip--list .cbs-row:hover .cbs-title{color:var(--cbs-accent);}
    .cms-strip--list .cbs-excerpt{font-size:15px;line-height:1.6;color:#5a5f72;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .cms-strip--list .cbs-all{display:inline-block;margin-top:clamp(20px,3vw,32px);font-size:14px;font-weight:600;color:var(--cbs-accent);text-decoration:none;}
    .cms-strip--list .cbs-all:hover{text-decoration:underline;}
    .cms-strip--list .cbs-foot{text-align:center;}
  </style>
  <div class="cbs-wrap">
    <div class="cbs-head">
      <p class="cbs-eyebrow">From the blog</p>
      <h2 class="cbs-heading">{{ heading }}</h2>
    </div>
    <div class="cbs-rows">
      {% for post in posts %}
        <a class="cbs-row" href="{{ blog_base }}{{ post.slug }}/">
          <span class="cbs-date">{% if post.publish_date %}{{ post.publish_date|date:"M j, Y" }}{% endif %}</span>
          <span>
            <span class="cbs-title">{{ post.title }}</span>
            <span class="cbs-excerpt">{{ post.display_excerpt }}</span>
          </span>
        </a>
      {% endfor %}
    </div>
    <div class="cbs-foot">
      <a class="cbs-all" href="{{ blog_base }}">View all posts →</a>
    </div>
  </div>
</section>
