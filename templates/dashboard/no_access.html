{% extends "base.html" %}

{% block title %}No access · Locked CMS{% endblock %}

{% block content %}
  <div class="page" style="max-width: 480px;">
    <h1 class="page-title">You don't have access to this site</h1>
    <p class="page-subtitle">
      Your account isn't a member of this site. If you think that's wrong,
      contact the agency that built it.
    </p>
    <form action="{% url 'logout' %}" method="post" style="margin-top: 24px;">
      {% csrf_token %}
      <button type="submit" class="btn btn-secondary">Sign out</button>
    </form>
  </div>
{% endblock %}
